<!DOCTYPE html>
<HTML lang="ja">
<HEAD>
<META charset="utf-8" />
<TITLE>BOKE防止プログラミング</TITLE>
<SCRIPT>

// 有名地の定義
const tokyo = { lat: 35.681236, lng: 139.767125 };
const osaka = { lat: 34.702485, lng: 135.495951 };
const park = { lat: 35.40551, lng: 139.60801 };

function getLocationAndDistance(hoge, lat1, lng1) {
    const element = document.getElementById("message");

    // ブラウザが対応しているか確認
    if (!navigator.geolocation) {
        element.innerText = "お使いのブラウザは位置情報に対応していません。";
        return;
    }

    element.innerText = "取得中...";

    // 位置情報を取得(watchPositionに最終変更予定)
    navigator.geolocation.getCurrentPosition(
        (position) => {
            here_lat = position.coords.latitude;  // 緯度
            here_lng = position.coords.longitude; // 経度
            element.innerText = `緯度: ${here_lat}, 経度: ${here_lng}`;

            distance = getDistance(here_lat, here_lng, lat1, lng1);
            element.innerHTML = hoge + distance + "kmです！";
        },
        (error) => {
            element.innerText = `エラー: ${error.message}`;
        }
    );
}

/**
 * 2地点の緯度経度から距離(km)を計算する関数
 */
function getDistance(lat1, lng1, lat2, lng2) {
  // 地球の半径 (km)
  const R = 6371; 
  
  // 度をラジアンに変換
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  
  const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
            Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
            Math.sin(dLng / 2) * Math.sin(dLng / 2);
            
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  const distance = R * c; // 距離 (km)
  
  return distance;
}


</SCRIPT>

</HEAD>
<BODY>
<DIV id="message">Hello World !</DIV><BUTTON type="button" onclick="getLocationAndDistance('こことの距離は', park.lat, park.lng)">お気に入り公園との距離！</BUTTON>
</BODY>
</HTML>

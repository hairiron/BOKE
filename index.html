<!DOCTYPE html>
<HTML lang="ja">
<HEAD>
<META charset="utf-8" />
<TITLE>BOKE防止プログラミング</TITLE>
<SCRIPT>

// 有名地の定義
const tokyo = { lat: 35.681236, lng: 139.767125 };
const osaka = { lat: 34.702485, lng: 135.495951 };

g_watchId = null;

// 1000ミリ秒（1秒）ごとに updateInfo を呼び出す 停止したい場合は clearInterval(intervalId);
const intervalId = setInterval(setMessage, 3000);

function startLocation() {
    const element = document.getElementById("message");
    const element_lat = document.getElementById("lat");
    const element_lng = document.getElementById("lng");

    // ブラウザが対応しているか確認
    if (!navigator.geolocation) {
        element.innerText = "お使いのブラウザは位置情報に対応していません。";
        return;
    }

    element.innerText = "取得中...";

    // 位置情報を取得開始
    g_watchId = navigator.geolocation.watchPosition(
        (position) => {
            here_lat = position.coords.latitude;  // 緯度
            here_lng = position.coords.longitude; // 経度
            // element.innerText = `緯度: ${here_lat}, 経度: ${here_lng}`;
            element_lat.innerText = here_lat;
            element_lng.innerText = here_lng;
        },
        (error) => {
            element.innerText = `エラー: ${error.message}`;
        },
        {
            // オプション設定
            enableHighAccuracy: true, // 高精度な位置情報を要求（GPSなど）
            timeout: 5000,            // タイムアウト時間（ミリ秒）
            maximumAge: 0             // キャッシュされた位置情報の有効期限
        }
    );

    return g_watchId;
}

function endLocation() {
    navigator.geolocation.clearWatch(g_watchId);
}

function setMessage(){
    const element_lat = document.getElementById("lat");
    here_lat = element_lat.innerHTML;

    const element_lng = document.getElementById("lng");
    here_lng = element_lng.innerHTML;

    //ドラゴンレーダ用の値セット
    if (here_lat != "???") {
        currentPos.lat = here_lat;
    }
    if (here_lng != "???") {
        currentPos.lng = here_lng;
    }

    draw();
}

/**
 * 2地点の緯度経度から距離(km)を計算する関数
 */
function getDistance(lat1, lng1, lat2, lng2) {
  // 地球の半径 (km)
  const R = 6371; 
  
  // 度をラジアンに変換
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  
  const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
            Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
            Math.sin(dLng / 2) * Math.sin(dLng / 2);
            
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  const distance = R * c; // 距離 (km)
  
  return distance;
}


</SCRIPT>
    <style>
        body { background: #222; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        #radar-container { position: relative; margin-bottom: 20px; }
        #radar { background: #1a4d1a; border: 8px solid #444; border-radius: 50%; box-shadow: 0 0 30px rgba(0,255,0,0.2); }
        .controls { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 10px; width: 300px; text-align: center; }
        input[type=range] { width: 100%; cursor: pointer; }
    </style>

</HEAD>
<BODY>
<DIV id="message">Hello World !</DIV>
<DIV id="lat">???</DIV>
<DIV id="lng">???</DIV>
<BUTTON type="button" onclick="startLocation()">開始</BUTTON>
<BUTTON type="button" onclick="endLocation()">終了</BUTTON>
<HR />
<!-- <BUTTON type="button" onclick="setMessage('公園との距離は', park.lat, park.lng)">手動で距離を計算</BUTTON> -->

<div id="radar-container">
    <canvas id="radar" width="400" height="400"></canvas>
</div>

<div class="controls">
    <label>広域 ← スケール調整 → 詳細</label><br>
    <input type="range" id="scaleRange" min="1" max="1000" value="15">
</div>

<script>
const canvas = document.getElementById('radar');
const ctx = canvas.getContext('2d');
const scaleInput = document.getElementById('scaleRange');

// 1. データ設定 (東京駅周辺の景勝地)   
let currentPos = { lat: 34.702485, lng: 135.495951}; 
const locations = [
    { name: "久良岐公園", lat: 35.40551, lng: 139.60801 }
];

const centerX = canvas.width / 2;
const centerY = canvas.height / 2;

function draw() {

    const scale = parseFloat(scaleInput.value) * 10; // スライダーの値で倍率決定
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // --- 背景のグリッド (同心円) ---
    ctx.strokeStyle = "rgba(45, 106, 45, 0.8)";
    ctx.lineWidth = 1;
    for(let i=1; i<=6; i++) {
        ctx.beginPath();
        ctx.arc(centerX, centerY, (canvas.width / 12) * i, 0, Math.PI * 2);
        ctx.stroke();
    }

    // --- 景勝地 (ターゲット) ---
    locations.forEach(loc => {
        const dx = (loc.lng - currentPos.lng) * scale;
        const dy = (currentPos.lat - loc.lat) * scale;
        const x = centerX + dx;
        const y = centerY + dy;
        
        // const element = document.getElementById("message");
        // element.innerHTML = `計算中`;

        // レーダーの円内に収まる場合のみ描画
        const distFromCenter = Math.sqrt(dx*dx + dy*dy);
        if (distFromCenter < canvas.width / 2 - 10) {
            ctx.beginPath();
            ctx.arc(x, y, 7, 0, Math.PI * 2);
            ctx.fillStyle = "#ffbb00";
            ctx.shadowBlur = 15;
            ctx.shadowColor = "#ffbb00";
            ctx.fill();
            ctx.shadowBlur = 0; // 他への影響を防ぐ

            const element = document.getElementById("message");
            distance = getDistance(loc.lat,loc.lng, currentPos.lat, currentPos.lng);
            element.innerHTML = `${distance} kmです！`;     // バッククォートを使ってテンプレートリテラルで変数を表示
            // element.innerHTML = distance + "kmです！";


        }
    });

    // --- 現在地 (中心の矢印) ---
    ctx.beginPath();
    ctx.moveTo(centerX, centerY - 10);
    ctx.lineTo(centerX - 7, centerY + 7);
    ctx.lineTo(centerX + 7, centerY + 7);
    ctx.closePath();
    ctx.fillStyle = "#fff";
    ctx.fill();
}

// スライダーを動かしたときに再描画
scaleInput.addEventListener('input', draw);

// 初期描画
draw();
</script>

</BODY>
</HTML>
